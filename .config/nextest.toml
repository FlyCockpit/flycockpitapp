[profile.default]
fail-fast = false
retries = 0
status-level = "slow"
final-status-level = "fail"
slow-timeout = { period = "60s", terminate-after = 2 }

# Inner-loop profile for iterative agent runs. Skips only apps/cli's
# integration-test binary (`kind(test)`), which spawns the real `cockpit`
# binary and live daemons — the most expensive link + runtime in the
# workspace. Unit tests in apps/cli and every other crate still run.
# The default profile (used by CI and the final pre-completion gate)
# runs everything.
[profile.quick]
default-filter = "not (package(cockpit-cli) & kind(test))"
