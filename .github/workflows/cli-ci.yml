---
name: CLI CI

"on":
  push:
    branches:
      - main
      - master
    paths:
      - "apps/cli/**"
      - ".github/workflows/cli-ci.yml"
  pull_request:
    paths:
      - "apps/cli/**"
      - ".github/workflows/cli-ci.yml"
  workflow_dispatch:

concurrency:
  group: cli-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/cli

env:
  CARGO_TERM_COLOR: always

jobs:
  gates:
    name: ${{ matrix.os }} / Rust ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            toolchain: stable
          - os: macos-latest
            toolchain: stable
          - os: windows-latest
            toolchain: stable
          - os: ubuntu-latest
            # Keep this pinned to apps/cli/Cargo.toml's rust-version.
            toolchain: 1.95.0

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install stable Rust
        if: matrix.toolchain == 'stable'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install MSRV Rust
        if: matrix.toolchain == '1.95.0'
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy, rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-${{ matrix.toolchain }}
          workspaces: apps/cli -> target

      - name: Build
        run: cargo build --locked

      - name: Test
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Format
        run: cargo fmt --check
