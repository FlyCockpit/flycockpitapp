name: Release Preflight

on:
  workflow_call:

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/cli

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/cli -> target
      # Scoped to the whole workspace, not just the `cockpit-cli` package: the
      # released binary links `cockpit-tui` and the `crates/*` layers, so a
      # package-scoped preflight would silently skip most of the shipped code.
      # Matches the workspace-scoped gate in cli-ci.yml.
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --tests --locked -- -D warnings
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-targets --locked
      - run: cargo test --workspace --doc --locked
