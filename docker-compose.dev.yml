# Local development services — Postgres + Redis
# Credentials match .env.example defaults so no extra config is needed.
#
# Usage:
#   pnpm dev:services          # start in background
#   docker compose -f docker-compose.dev.yml down   # stop
#   docker compose -f docker-compose.dev.yml down -v # stop + delete data

name: flycockpit-dev

services:
  postgres:
    image: postgres:17
    container_name: flycockpit-dev-postgres
    environment:
      POSTGRES_DB: flycockpit
      POSTGRES_USER: postgres
      # DEV ONLY — do not use this password in production.
      POSTGRES_PASSWORD: password
    ports:
      # Bind to loopback only. A bare "5432:5432" binds 0.0.0.0 and, because
      # Docker writes its own iptables rules ahead of ufw/firewalld, would
      # expose Postgres to the public internet on a VPS — with the dev password
      # below — even behind a closed host firewall. localhost dev is unaffected.
      - "127.0.0.1:5432:5432"
    volumes:
      - starter_dev_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: flycockpit-dev-redis
    ports:
      # Loopback only — see the postgres note above. Redis has no auth here, so
      # a 0.0.0.0 binding on a VPS is an open, unauthenticated data store.
      - "127.0.0.1:6379:6379"
    volumes:
      - starter_dev_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  starter_dev_postgres:
  starter_dev_redis:
