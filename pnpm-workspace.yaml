packages:
  - apps/*
  - packages/*
minimumReleaseAge: 10080
minimumReleaseAgeStrict: true
minimumReleaseAgeIgnoreMissingTime: false
# Excludes for packages that fail the 7-day minimum-age check on re-resolution.
# All previous entries (devalue, react-doctor, oxlint + bindings, i18next) were
# audited on 2026-05-27 and the locked versions are now ≥7 days old, so the
# list is empty. Restore an entry (with its publish date) if a future
# re-resolution flags a package as too young.
minimumReleaseAgeExclude:
  # GHSA-p6gq-j5cr-w38f: nodemailer 9.0.1 (released 2026-06-17) is the first
  # fixed version and is <7 days old. Remove once it ages past 2026-06-24.
  - nodemailer
# Each selector lifts a transitive out of its vulnerable range. All target
# versions pass the 7-day minimumReleaseAge gate; selectors are scoped tight so
# unrelated majors are untouched. The picomatch@<2.3.2 and devalue@>=5.6.3
# <5.8.1 overrides for the apps/docs (Astro/Starlight) chain were retired on
# 2026-05-27 — upstream now resolves to the patched versions naturally.
overrides:
  hono@<4.12.25: ">=4.12.25" # CVE-2026-54290 (CORS credential origin reflection)
  picomatch@>=4 <4.0.4: ">=4.0.4" # CVE-2026-33671 (ReDoS via extglob)
  defu@<6.1.5: ">=6.1.5" # CVE-2026-35209 (prototype pollution)
  fast-uri@<3.1.2: ">=3.1.2" # CVE-2026-6321 / CVE-2026-6322 (path traversal)
  # CVE-2026-44635 (JSON-path injection) is patched in 0.28.17. Pinned EXACT
  # (not just `>=0.28.17`) to dedupe @better-auth/core: better-auth 1.6.11 peers
  # `kysely ^0.28.17` (excludes the otherwise-hoisted 0.29.0), and two copies of
  # @better-auth/core split its types so the api-key plugin stops being assignable
  # to BetterAuthPlugin. kysely is only used transitively via better-auth here.
  kysely: 0.28.17
  path-to-regexp@>=8 <8.4.0: ">=8.4.0" # CVE-2026-4926 (ReDoS)
  # Peer-range alignment after 2026-06 dependency refresh. These are scoped to
  # the packages that declare the peers and all target releases are older than
  # the 7-day minimumReleaseAge gate.
  "@hono/mcp@0.3.0>hono-rate-limiter": 0.5.3
  "bullmq@5.78.1>ioredis": 5.11.1
  "vite-plugin-pwa@1.3.0>workbox-build": 7.4.1
  # workbox-build transitives — vite-plugin-pwa 1.3.0 → workbox-build 7.4.1 is
  # the latest upstream release and still pulls in vulnerable versions. Drop
  # these overrides if workbox-build patches the chain.
  serialize-javascript@<7.0.3: ">=7.0.3" # GHSA-5c6j-r48x-rmvq (RCE via RegExp.flags)
  lodash@<4.18.0: ">=4.18.0" # GHSA-r5fr-rjxr-66jc (code injection via _.template)
  "@babel/plugin-transform-modules-systemjs@<7.29.4": ">=7.29.4 <7.29.7" # GHSA-fv7c-fp4j-7gwp (cap excludes too-young 7.29.7)
blockExoticSubdeps: true
dangerouslyAllowAllBuilds: false
savePrefix: ""
# Moved here from the package.json "pnpm" field, which pnpm 11 no longer reads.
peerDependencyRules:
  allowedVersions:
    vite: "*"
allowBuilds:
  '@prisma/engines': true
  esbuild: true
  lefthook: true
  msgpackr-extract: true
  msw: true
  prisma: true
  sharp: true
